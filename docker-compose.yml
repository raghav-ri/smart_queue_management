version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: qflow-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: smartqueue
      MYSQL_ROOT_PASSWORD: production_password
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: qflow-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: smartqueue
      DB_USER: root
      DB_PASSWORD: production_password
      JWT_SECRET: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: qflow-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=http://localhost:8080

volumes:
  mysql-data:
